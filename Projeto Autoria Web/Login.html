<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="CSS/estilo-login.css">
</head>
<body>
    <div class="container">
        <h2>LOGIN</h2>
        <img src="IMG/LOGO.png" alt="LOGO" class="logo">
        <p class="slogan">SUPERE SEUS LIMITES!</p>
    <div class="card">
        <form>
            <label for="nome">NOME:</label>
            <input type="text" id="nome" name="nome" required>
            <label for="senha">SENHA:</label>
            <input type="password" id="senha" name="senha" required>
            <label for="confirma">CONFIRMAR SENHA:</label>
            <input type="password" id="confirmar" name="confirmar" required>
            <label for="cep">CEP:</label>
            <input type="text" id="cap" name="cep" placeholder="00000-000" required >
            <label for="endereço">ENDEREÇO:</label>
            <input type="text" id="endereço" name="endereço"required>
            <a href="conta.html" class="criar">Criar uma conta</a>
            <button type="submit" formaction="index.html">ENTRAR</button>
        </form>
    </div>
    </div>
</body>
</html>
